<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>✅ TaskFlow — Your Focus Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0f14;
      --surface:   #16181f;
      --card:      #1c1e27;
      --border:    #2a2d3a;
      --accent:    #7c6af7;
      --accent2:   #f7776a;
      --accent3:   #5dd8b0;
      --text:      #e8eaf0;
      --muted:     #6b6f85;
      --done-bg:   #1a2520;
      --done-text: #4a8f72;
      --radius:    14px;
      --shadow:    0 8px 32px rgba(0,0,0,0.4);
      --trans:     0.22s cubic-bezier(.4,0,.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
      overflow-x: hidden;
    }

    /* ===== ANIMATED BG BLOBS ===== */
    .bg-blobs {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .blob {
      position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.18;
      animation: drift 18s infinite alternate ease-in-out;
    }
    .blob-1 { width: 520px; height: 520px; background: var(--accent); top: -120px; left: -120px; animation-duration: 20s; }
    .blob-2 { width: 380px; height: 380px; background: var(--accent2); bottom: -80px; right: -80px; animation-duration: 14s; animation-delay: -7s; }
    .blob-3 { width: 260px; height: 260px; background: var(--accent3); top: 40%; left: 55%; animation-duration: 22s; animation-delay: -3s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* ===== WRAPPER ===== */
    .app {
      position: relative; z-index: 1;
      max-width: 700px; margin: 0 auto;
      padding: 28px 16px 0;
    }

    /* ===== HEADER ===== */
    header {
      text-align: center;
      padding: 48px 0 32px;
    }
    .brand {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--accent) 0%, #a89bf8 40%, var(--accent2) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .brand span { font-size: 0.85em; }
    .tagline {
      font-size: 0.92rem; color: var(--muted); margin-top: 6px;
      font-weight: 300; letter-spacing: 0.5px;
    }
    .datetime {
      margin-top: 12px;
      font-size: 0.82rem; color: var(--muted);
      letter-spacing: 0.5px;
    }

    /* ===== PROGRESS SECTION ===== */
    .progress-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }
    .progress-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .progress-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem; font-weight: 700;
      color: var(--text); letter-spacing: 0.3px;
    }
    .progress-pct {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem; font-weight: 800;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .progress-bar-track {
      background: var(--border);
      border-radius: 100px; height: 10px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%);
      border-radius: 100px;
      width: 0%;
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
      position: relative; overflow: hidden;
    }
    .progress-bar-fill::after {
      content: '';
      position: absolute; top: 0; left: -60%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer { to { left: 160%; } }

    .stats {
      display: flex; gap: 12px; margin-top: 14px;
      flex-wrap: wrap;
    }
    .stat {
      flex: 1 1 80px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      text-align: center;
    }
    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem; font-weight: 800; display: block;
    }
    .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 2px; letter-spacing: 0.4px; }
    .stat:nth-child(1) .stat-num { color: #a89bf8; }
    .stat:nth-child(2) .stat-num { color: var(--accent3); }
    .stat:nth-child(3) .stat-num { color: var(--accent2); }

    .motivation-msg {
      margin-top: 12px; font-size: 0.85rem;
      font-weight: 500; text-align: center;
      min-height: 22px;
      transition: all var(--trans);
    }

    /* ===== INPUT AREA ===== */
    .input-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      display: flex; gap: 10px;
      align-items: center;
    }
    .task-input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color var(--trans), box-shadow var(--trans);
    }
    .task-input::placeholder { color: var(--muted); }
    .task-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
    }
    .add-btn {
      background: linear-gradient(135deg, var(--accent), #9c8ff8);
      border: none; border-radius: 10px;
      color: #fff; padding: 12px 20px;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      transition: transform var(--trans), box-shadow var(--trans), filter var(--trans);
      box-shadow: 0 4px 18px rgba(124,106,247,0.35);
    }
    .add-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(124,106,247,0.5);
      filter: brightness(1.1);
    }
    .add-btn:active { transform: translateY(0); }

    /* ===== FILTERS ===== */
    .filters {
      display: flex; gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 100px;
      color: var(--muted);
      padding: 7px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.83rem; font-weight: 500;
      cursor: pointer;
      transition: all var(--trans);
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 4px 14px rgba(124,106,247,0.4);
    }
    .clear-btn {
      margin-left: auto;
      background: transparent;
      border: 1.5px solid #3a2a2a;
      border-radius: 100px;
      color: var(--accent2);
      padding: 7px 16px;
      font-size: 0.83rem; font-weight: 500;
      cursor: pointer;
      transition: all var(--trans);
      font-family: 'DM Sans', sans-serif;
    }
    .clear-btn:hover {
      background: rgba(247,119,106,0.1);
      border-color: var(--accent2);
    }

    /* ===== TASK LIST ===== */
    .tasks-section {
      display: flex; flex-direction: column; gap: 10px;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center; padding: 60px 24px;
      color: var(--muted);
      display: none;
    }
    .empty-state.visible { display: block; }
    .empty-icon { font-size: 3.5rem; display: block; margin-bottom: 12px; opacity: 0.6; }
    .empty-state h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem; font-weight: 700;
      color: var(--text); margin-bottom: 6px;
    }
    .empty-state p { font-size: 0.88rem; line-height: 1.6; }

    /* ===== TASK CARD ===== */
    .task-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex; align-items: flex-start; gap: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      transition: transform var(--trans), box-shadow var(--trans), border-color var(--trans), opacity var(--trans);
      animation: slideIn 0.3s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .task-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
      border-color: #363950;
    }
    .task-item.completed {
      background: var(--done-bg);
      border-color: #203228;
      opacity: 0.8;
    }
    .task-item.removing {
      animation: slideOut 0.3s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes slideOut {
      to { opacity: 0; transform: translateY(-8px) scale(0.97); max-height: 0; padding: 0; margin: 0; }
    }

    /* Custom Checkbox */
    .checkbox-wrap { flex-shrink: 0; margin-top: 2px; }
    .checkbox-wrap input[type="checkbox"] { display: none; }
    .custom-check {
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all var(--trans);
      background: var(--surface);
    }
    .custom-check:hover { border-color: var(--accent); background: rgba(124,106,247,0.1); }
    .custom-check .checkmark {
      font-size: 13px; opacity: 0;
      transform: scale(0);
      transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
    }
    input[type="checkbox"]:checked + .custom-check {
      background: linear-gradient(135deg, var(--accent3), #4ecfa0);
      border-color: var(--accent3);
    }
    input[type="checkbox"]:checked + .custom-check .checkmark {
      opacity: 1; transform: scale(1);
    }

    .task-body { flex: 1; min-width: 0; }

    .task-text {
      font-size: 0.95rem; font-weight: 400;
      line-height: 1.5; word-break: break-word;
      transition: all var(--trans);
    }
    .task-item.completed .task-text {
      color: var(--done-text);
      text-decoration: line-through;
      text-decoration-color: #3a6655;
    }

    .task-edit-input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--accent);
      border-radius: 8px;
      padding: 6px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
    }

    .task-meta {
      font-size: 0.73rem; color: var(--muted);
      margin-top: 5px; display: flex; gap: 8px;
      align-items: center;
    }
    .task-meta .badge {
      padding: 2px 8px; border-radius: 100px;
      font-size: 0.68rem; font-weight: 500;
    }
    .badge-pending { background: rgba(124,106,247,0.15); color: #a89bf8; }
    .badge-done    { background: rgba(93,216,176,0.15);  color: var(--accent3); }

    .task-actions { display: flex; gap: 6px; flex-shrink: 0; margin-top: 1px; }
    .task-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 0.9rem;
      transition: all var(--trans);
      color: var(--muted);
    }
    .task-btn:hover { transform: scale(1.12); }
    .task-btn.edit:hover { border-color: #7cb5f8; background: rgba(124,181,248,0.1); color: #7cb5f8; }
    .task-btn.save:hover { border-color: var(--accent3); background: rgba(93,216,176,0.1); color: var(--accent3); }
    .task-btn.del:hover  { border-color: var(--accent2); background: rgba(247,119,106,0.1); color: var(--accent2); }

    /* ===== TOAST ===== */
    .toast-container {
      position: fixed; bottom: 28px; right: 20px;
      z-index: 9999; display: flex; flex-direction: column; gap: 10px;
      pointer-events: none;
    }
    .toast {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 0.88rem; font-weight: 500;
      box-shadow: 0 8px 28px rgba(0,0,0,0.4);
      animation: toastIn 0.4s cubic-bezier(.34,1.56,.64,1) both;
      max-width: 280px; pointer-events: auto;
    }
    .toast.out { animation: toastOut 0.3s ease-in forwards; }
    @keyframes toastIn  { from { opacity:0; transform:translateY(20px) scale(.9); } to { opacity:1; transform:none; } }
    @keyframes toastOut { to   { opacity:0; transform:translateX(30px); } }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 100px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .app { padding: 16px 12px 0; }
      header { padding: 32px 0 20px; }
      .input-card { flex-wrap: wrap; }
      .add-btn { width: 100%; justify-content: center; display: flex; }
      .filters { gap: 6px; }
      .filter-btn, .clear-btn { padding: 6px 12px; font-size: 0.78rem; }
      .task-item { padding: 14px 14px; gap: 10px; }
      .stats { gap: 8px; }
    }
  </style>
</head>
<body>

  <!-- Animated bg blobs -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="app">

    <!-- Header -->
    <header>
      <div class="brand"><span>✅</span> TaskFlow</div>
      <div class="tagline">Your personal focus hub — get things done.</div>
      <div class="datetime" id="datetime"></div>
    </header>

    <!-- Progress Card -->
    <div class="progress-card">
      <div class="progress-header">
        <span class="progress-title">🔥 Progress</span>
        <span class="progress-pct" id="prog-pct">0%</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="prog-bar"></div>
      </div>
      <div class="stats">
        <div class="stat"><span class="stat-num" id="stat-total">0</span><div class="stat-label">🎯 Total</div></div>
        <div class="stat"><span class="stat-num" id="stat-done">0</span><div class="stat-label">✅ Done</div></div>
        <div class="stat"><span class="stat-num" id="stat-left">0</span><div class="stat-label">📝 Left</div></div>
      </div>
      <div class="motivation-msg" id="motive-msg"></div>
    </div>

    <!-- Input Area -->
    <div class="input-card">
      <input
        class="task-input"
        id="task-input"
        type="text"
        placeholder="🚀 Add a new task…"
        maxlength="200"
        autocomplete="off"
      />
      <button class="add-btn" id="add-btn">＋ Add</button>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">📝 Pending</button>
      <button class="filter-btn" data-filter="completed">✅ Done</button>
      <button class="clear-btn" id="clear-btn">🗑 Clear Done</button>
    </div>

    <!-- Task List -->
    <div class="tasks-section" id="task-list"></div>

    <!-- Empty State -->
    <div class="empty-state" id="empty-state">
      <span class="empty-icon">🎯</span>
      <h3>Nothing here yet!</h3>
      <p>Add your first task above and start crushing your goals.</p>
    </div>

  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script>
    /* ===== STATE ===== */
    let tasks = JSON.parse(localStorage.getItem('taskflow_tasks') || '[]');
    let currentFilter = 'all';
    let editingId = null;

    /* ===== MOTIVATIONAL MESSAGES ===== */
    const motivations = [
      '', // 0 completed
      '🎉 Great start! You did it!',
      '🚀 Keep the momentum going!',
      '🔥 You\'re on fire — keep it up!',
      '💪 Absolutely crushing it!',
      '⚡ Unstoppable force detected!',
      '🌟 Incredible focus streak!',
      '🏆 Champion-level productivity!',
      '🎯 Laser-focused and thriving!',
      '✨ You make it look effortless!',
      '🦁 Nothing can stop you now!',
    ];

    /* ===== HELPERS ===== */
    function save() {
      localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
    }

    function genId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    }

    function formatDate(ts) {
      const d = new Date(ts);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) +
             ' · ' + d.toLocaleDateString([], { month: 'short', day: 'numeric' });
    }

    /* ===== DATETIME CLOCK ===== */
    function updateClock() {
      const now = new Date();
      document.getElementById('datetime').textContent =
        now.toLocaleDateString([], { weekday:'long', year:'numeric', month:'long', day:'numeric' }) +
        '  ·  ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    /* ===== PROGRESS ===== */
    function updateProgress() {
      const total     = tasks.length;
      const done      = tasks.filter(t => t.completed).length;
      const remaining = total - done;
      const pct       = total ? Math.round((done / total) * 100) : 0;

      document.getElementById('prog-pct').textContent   = pct + '%';
      document.getElementById('prog-bar').style.width   = pct + '%';
      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-done').textContent  = done;
      document.getElementById('stat-left').textContent  = remaining;

      // Motivational message
      const idx = Math.min(done, motivations.length - 1);
      const msg = done > 0 ? (motivations[idx] || '🚀 You\'re a productivity legend!') : '';
      document.getElementById('motive-msg').textContent = msg;
    }

    /* ===== TOAST ===== */
    function showToast(msg, accent) {
      const container = document.getElementById('toast-container');
      const t = document.createElement('div');
      t.className = 'toast';
      t.style.borderLeftColor = accent || 'var(--accent)';
      t.textContent = msg;
      container.appendChild(t);
      setTimeout(() => {
        t.classList.add('out');
        setTimeout(() => t.remove(), 300);
      }, 2800);
    }

    /* ===== RENDER ===== */
    function getFiltered() {
      if (currentFilter === 'pending')   return tasks.filter(t => !t.completed);
      if (currentFilter === 'completed') return tasks.filter(t =>  t.completed);
      return tasks;
    }

    function render() {
      const list    = document.getElementById('task-list');
      const empty   = document.getElementById('empty-state');
      const filtered = getFiltered();

      list.innerHTML = '';

      if (filtered.length === 0) {
        empty.classList.add('visible');
      } else {
        empty.classList.remove('visible');
        filtered.forEach(task => list.appendChild(buildCard(task)));
      }
      updateProgress();
    }

    function buildCard(task) {
      const isEditing = editingId === task.id;
      const item = document.createElement('div');
      item.className = 'task-item' + (task.completed ? ' completed' : '');
      item.dataset.id = task.id;

      item.innerHTML = `
        <div class="checkbox-wrap">
          <input type="checkbox" id="chk-${task.id}" ${task.completed ? 'checked' : ''}/>
          <label class="custom-check" for="chk-${task.id}">
            <span class="checkmark">✓</span>
          </label>
        </div>
        <div class="task-body">
          ${isEditing
            ? `<input class="task-edit-input" id="edit-${task.id}" type="text" value="${escapeHtml(task.text)}" maxlength="200"/>`
            : `<div class="task-text">${escapeHtml(task.text)}</div>`
          }
          <div class="task-meta">
            <span class="badge ${task.completed ? 'badge-done' : 'badge-pending'}">
              ${task.completed ? '✅ Done' : '📝 Todo'}
            </span>
            <span>${formatDate(task.createdAt)}</span>
          </div>
        </div>
        <div class="task-actions">
          ${isEditing
            ? `<button class="task-btn save" title="Save" data-action="save" data-id="${task.id}">💾</button>`
            : `<button class="task-btn edit" title="Edit" data-action="edit" data-id="${task.id}">✏️</button>`
          }
          <button class="task-btn del" title="Delete" data-action="delete" data-id="${task.id}">🗑️</button>
        </div>
      `;

      // Checkbox toggle
      item.querySelector(`#chk-${task.id}`).addEventListener('change', () => toggleTask(task.id));

      // Action buttons
      item.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', () => {
          const action = btn.dataset.action;
          if (action === 'delete') deleteTask(task.id, item);
          else if (action === 'edit')  startEdit(task.id);
          else if (action === 'save')  saveEdit(task.id);
        });
      });

      // Save on Enter for edit input
      if (isEditing) {
        const inp = item.querySelector(`#edit-${task.id}`);
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveEdit(task.id); });
        setTimeout(() => inp && inp.focus(), 50);
      }

      return item;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ===== CRUD ===== */
    function addTask() {
      const input = document.getElementById('task-input');
      const text  = input.value.trim();
      if (!text) {
        input.style.borderColor = 'var(--accent2)';
        setTimeout(() => input.style.borderColor = '', 1000);
        return;
      }
      const task = { id: genId(), text, completed: false, createdAt: Date.now() };
      tasks.unshift(task);
      save();
      input.value = '';
      render();
      showToast('🚀 Task added!');
    }

    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      const wasCompleted = task.completed;
      task.completed = !task.completed;
      save();
      render();
      if (!wasCompleted && task.completed) {
        const done = tasks.filter(t => t.completed).length;
        const idx  = Math.min(done, motivations.length - 1);
        const msg  = motivations[idx] || '🚀 You\'re a productivity legend!';
        showToast(msg, 'var(--accent3)');
      }
    }

    function deleteTask(id, el) {
      el.classList.add('removing');
      el.addEventListener('animationend', () => {
        tasks = tasks.filter(t => t.id !== id);
        save();
        render();
        showToast('🗑 Task removed', 'var(--accent2)');
      }, { once: true });
    }

    function startEdit(id) {
      editingId = id;
      render();
    }

    function saveEdit(id) {
      const inp = document.getElementById(`edit-${id}`);
      if (!inp) return;
      const text = inp.value.trim();
      if (!text) return;
      const task = tasks.find(t => t.id === id);
      if (task) task.text = text;
      editingId = null;
      save();
      render();
      showToast('✏️ Task updated!', '#7cb5f8');
    }

    function clearCompleted() {
      const count = tasks.filter(t => t.completed).length;
      if (!count) { showToast('No completed tasks to clear 😅'); return; }
      tasks = tasks.filter(t => !t.completed);
      save();
      render();
      showToast(`🧹 Cleared ${count} completed task${count > 1 ? 's' : ''}`, 'var(--accent2)');
    }

    /* ===== FILTERS ===== */
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    /* ===== EVENT LISTENERS ===== */
    document.getElementById('add-btn').addEventListener('click', addTask);
    document.getElementById('task-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });
    document.getElementById('clear-btn').addEventListener('click', clearCompleted);

    // Click outside edit cancels it
    document.addEventListener('click', e => {
      if (editingId && !e.target.closest('.task-item')) {
        editingId = null;
        render();
      }
    });

    /* ===== INIT ===== */
    render();
  </script>
</body>
</html>
